<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>15-Day Frontend Training — College Sessions</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#f5f4f0;--paper:#fff;--ink:#17181c;--muted:#7c7b78;--rule:#e8e6e0;
  --html:#d4460f;--css:#1d4ed8;--js:#a16207;--proj:#15803d;
  --html-s:#fff3ee;--css-s:#eff6ff;--js-s:#fefce8;--proj-s:#f0fdf4;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--font);line-height:1.6;min-height:100vh}

/* HEADER */
header{background:var(--ink);color:#fff;padding:48px 28px 40px;overflow:hidden;position:relative}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 100% 50%,rgba(212,70,15,.18),transparent 70%);pointer-events:none}
.h-inner{max-width:860px;margin:0 auto;position:relative}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.38);margin-bottom:12px}
header h1{font-size:clamp(1.7rem,4.5vw,2.8rem);font-weight:700;letter-spacing:-.03em;line-height:1.15;margin-bottom:10px}
header h1 span{color:var(--html)}
header p{color:rgba(255,255,255,.45);font-size:.88rem;font-weight:300;max-width:460px;margin-bottom:24px}
.meta-pills{display:flex;gap:10px;flex-wrap:wrap}
.mpill{font-family:var(--mono);font-size:10px;letter-spacing:.06em;padding:4px 13px;border-radius:100px;border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.45)}
.mpill.a{border-color:rgba(212,70,15,.5);color:#f97316}

/* WEEK STRIP */
.week-strip{background:var(--paper);border-bottom:1px solid var(--rule);display:flex;overflow-x:auto;scrollbar-width:none}
.week-strip::-webkit-scrollbar{display:none}
.wtab{flex:1;min-width:80px;padding:12px 10px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;text-align:center}
.wtab:hover{color:var(--ink)}
.wtab.active{color:var(--ink);border-bottom-color:var(--ink);font-weight:600}

/* DAY TABS */
.day-strip{background:var(--paper);border-bottom:1px solid var(--rule);display:flex;overflow-x:auto;scrollbar-width:none;padding:0 8px;position:sticky;top:0;z-index:40}
.day-strip::-webkit-scrollbar{display:none}
.dtab{padding:10px 14px;font-family:var(--mono);font-size:11px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.dtab:hover{color:var(--ink)}
.dtab.active{color:var(--ink);border-bottom-color:var(--ink)}
.dtab[data-type=html].active{border-bottom-color:var(--html);color:var(--html)}
.dtab[data-type=css].active{border-bottom-color:var(--css);color:var(--css)}
.dtab[data-type=js].active{border-bottom-color:var(--js);color:var(--js)}
.dtab[data-type=proj].active{border-bottom-color:var(--proj);color:var(--proj)}

/* MAIN */
main{max-width:860px;margin:0 auto;padding:32px 20px 80px}
.day-panel{display:none}.day-panel.active{display:block}

/* DAY HEADER */
.dh{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:28px;flex-wrap:wrap}
.dh-left{}
.dh-meta{font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.dh-title{font-size:1.5rem;font-weight:700;letter-spacing:-.025em;line-height:1.2}
.dh-sub{font-size:.83rem;color:var(--muted);margin-top:5px;font-weight:400}
.badge{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:5px 14px;border-radius:100px;flex-shrink:0;margin-top:4px}
.badge-html{background:var(--html-s);color:var(--html)}
.badge-css{background:var(--css-s);color:var(--css)}
.badge-js{background:var(--js-s);color:var(--js)}
.badge-proj{background:var(--proj-s);color:var(--proj)}

/* SESSION BLOCK */
.slabel{font-family:var(--mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.session-card{background:var(--paper);border:1px solid var(--rule);border-radius:12px;overflow:hidden;margin-bottom:22px}
.srow{display:grid;grid-template-columns:90px 1fr;border-bottom:1px solid var(--rule)}
.srow:last-child{border-bottom:none}
.stime{padding:12px 14px;font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--bg);border-right:1px solid var(--rule);display:flex;align-items:center;line-height:1.3;letter-spacing:.02em}
.sact{padding:12px 16px}
.sact.hl-html{border-left:3px solid var(--html);background:linear-gradient(90deg,rgba(212,70,15,.04),transparent)}
.sact.hl-css{border-left:3px solid var(--css);background:linear-gradient(90deg,rgba(29,78,216,.04),transparent)}
.sact.hl-js{border-left:3px solid var(--js);background:linear-gradient(90deg,rgba(161,98,7,.04),transparent)}
.sact.hl-proj{border-left:3px solid var(--proj);background:linear-gradient(90deg,rgba(21,128,61,.04),transparent)}
.sact.hl-break{opacity:.6}
.sname{font-weight:600;font-size:.85rem;margin-bottom:2px}
.sdetail{font-size:.78rem;color:var(--muted);line-height:1.5}

/* TWO COL */
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
@media(max-width:580px){.two{grid-template-columns:1fr}}
.box{background:var(--paper);border:1px solid var(--rule);border-radius:12px;padding:18px}
.box-label{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.tlist{list-style:none;display:flex;flex-direction:column;gap:7px}
.tlist li{font-size:.82rem;display:flex;align-items:baseline;gap:8px;line-height:1.4}
.tlist li::before{content:'›';color:var(--muted);flex-shrink:0;font-size:.9rem}

/* HOMEWORK */
.hw{border-radius:12px;padding:20px 22px;margin-bottom:22px;border:1.5px solid}
.hw-html{background:var(--html-s);border-color:rgba(212,70,15,.2)}
.hw-css{background:var(--css-s);border-color:rgba(29,78,216,.18)}
.hw-js{background:var(--js-s);border-color:rgba(161,98,7,.22)}
.hw-proj{background:var(--proj-s);border-color:rgba(21,128,61,.22)}
.hw-tag{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px}
.hw-html .hw-tag{color:var(--html)}.hw-css .hw-tag{color:var(--css)}.hw-js .hw-tag{color:var(--js)}.hw-proj .hw-tag{color:var(--proj)}
.hw-name{font-size:.98rem;font-weight:700;margin-bottom:6px;line-height:1.35}
.hw-desc{font-size:.8rem;color:var(--muted);margin-bottom:12px;line-height:1.55}
.hw-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.hw-list li{font-size:.8rem;color:#444;display:flex;align-items:baseline;gap:8px}
.hw-list li::before{content:'☐';font-size:.9rem;flex-shrink:0;color:var(--muted)}
.hw-time{display:inline-block;margin-top:12px;font-family:var(--mono);font-size:10px;padding:3px 10px;border-radius:100px;background:rgba(0,0,0,.06);color:var(--muted);letter-spacing:.04em}

/* TIP */
.tip{background:var(--paper);border:1px solid var(--rule);border-radius:10px;padding:14px 16px;font-size:.8rem;color:var(--muted);display:flex;gap:10px;margin-bottom:22px}
.tip-i{flex-shrink:0;font-size:1rem}

/* PREV NEXT */
.pnav{display:flex;justify-content:space-between;align-items:center;padding-top:20px;border-top:1px solid var(--rule);margin-top:8px}
.pnav-btn{font-family:var(--mono);font-size:11px;padding:9px 18px;border-radius:8px;border:1px solid var(--rule);background:var(--paper);color:var(--ink);cursor:pointer;transition:background .15s}
.pnav-btn:hover{background:var(--bg)}.pnav-btn:disabled{opacity:.28;cursor:default}
.pnav-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em}
</style>
</head>
<body>

<header>
  <div class="h-inner">
    <p class="eyebrow">College Training · Sun–Fri · 3:30–4:30 PM</p>
    <h1>15-Day <span>Frontend</span> Training</h1>
    <p>One focused hour each evening. Structured for someone who knows the basics and needs to build confidently.</p>
    <div class="meta-pills">
      <span class="mpill a">⏱ 3:30 – 4:30 PM</span>
      <span class="mpill">Sun – Fri</span>
      <span class="mpill">HTML · CSS · JS</span>
      <span class="mpill">Intermediate Beginner</span>
    </div>
  </div>
</header>

<div class="week-strip" id="weekStrip"></div>
<div class="day-strip" id="dayStrip"></div>

<main id="main"></main>

const weekNames = {1:"Week 1 · HTML",2:"Week 2 · CSS",3:"Week 3 · JS + Project"};
const typeLabel = {html:"HTML",css:"CSS",js:"JavaScript",proj:"Project"};
const hlClass   = {html:"hl-html",css:"hl-css",js:"hl-js",proj:"hl-proj",break:"hl-break"};

let current = 0;

function buildPanel(d, idx) {
  const n = String(idx+1).padStart(2,'0');
  const rows = d.schedule.map(s=>`
    <div class="srow">
      <div class="stime">${s.t}</div>
      <div class="sact ${hlClass[s.hl]||''}">
        <div class="sname">${s.n}</div>
        ${s.d?`<div class="sdetail">${s.d}</div>`:''}
      </div>
    </div>`).join('');

  const topics = d.topics.map(t=>`<li>${t}</li>`).join('');
  const hwList = d.hw.list.map(l=>`<li>${l}</li>`).join('');

  const el = document.createElement('div');
  el.className = 'day-panel';
  el.id = 'p'+idx;
  el.innerHTML = `
    <div class="dh">
      <div class="dh-left">
        <div class="dh-meta">Day ${n} · Week ${d.week} · ${weekNames[d.week].split('·')[1].trim()}</div>
        <div class="dh-title">${d.title}</div>
        <div class="dh-sub">${d.sub}</div>
      </div>
      <span class="badge badge-${d.type}">${typeLabel[d.type]}</span>
    </div>

    <p class="slabel">Session — 3:30 to 4:30 PM</p>
    <div class="session-card">${rows}</div>

    <div class="two">
      <div class="box">
        <div class="box-label">Topics Covered</div>
        <ul class="tlist">${topics}</ul>
      </div>
      <div class="box">
        <div class="box-label">Homework</div>
        <div class="hw hw-${d.type}" style="margin-bottom:0;border:none;padding:0;background:none">
          <div class="hw-tag">📝 ${d.hw.name}</div>
          <div class="hw-desc">${d.hw.desc}</div>
          <ul class="hw-list">${hwList}</ul>
          <span class="hw-time">⏱ ${d.hw.time}</span>
        </div>
      </div>
    </div>

    <div class="pnav">
      <button class="pnav-btn" onclick="goTo(${idx-1})" ${idx===0?'disabled':''}>← Prev</button>
      <span class="pnav-label">DAY ${n} / 15</span>
      <button class="pnav-btn" onclick="goTo(${idx+1})" ${idx===14?'disabled':''}>Next →</button>
    </div>`;
  return el;
}

// Week tabs
const ws = document.getElementById('weekStrip');
[1,2,3].forEach(w=>{
  const b=document.createElement('button');
  b.className='wtab'+(w===1?' active':'');
  b.textContent=weekNames[w];
  b.onclick=()=>goTo(days.findIndex(d=>d.week===w));
  b.id='wt'+w;
  ws.appendChild(b);
});

// Day tabs + panels
const ds = document.getElementById('dayStrip');
const mn = document.getElementById('main');
days.forEach((d,i)=>{
  const b=document.createElement('button');
  b.className='dtab';
  b.dataset.type=d.type;
  b.textContent='Day '+(i+1);
  b.onclick=()=>goTo(i);
  b.id='dt'+i;
  ds.appendChild(b);
  mn.appendChild(buildPanel(d,i));
});

function goTo(i){
  if(i<0||i>14)return;
  current=i;
  document.querySelectorAll('.day-panel').forEach((p,j)=>p.classList.toggle('active',j===i));
  document.querySelectorAll('.dtab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.querySelectorAll('.wtab').forEach((t,j)=>t.classList.toggle('active',j+1===days[i].week));
  document.getElementById('dt'+i).scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  window.scrollTo({top:0,behavior:'smooth'});
}

goTo(0);
</script>
